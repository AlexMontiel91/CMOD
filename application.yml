spring:
  freemarker:
    # necesario para acceder al token CSRF (_csrf) desde las plantillas .ftlh
    expose-request-attributes: true
    # sufijo por defecto en Spring Boot 2.x ya es .ftlh; se deja explicito
    suffix: .ftlh

# --- Seguridad de la aplicacion ---
app:
  security:
    cipher-key: ${APP_SECURITY_CIPHER_KEY}   # llave AES (valor real en server.env)
    login:
      max-attempts: 2      # RACF revoca a los 3; cortamos antes. Confirmar REVOKE(n) con RACF.
      lock-minutes: 15     # enfriamiento anti-martilleo (no reinicia el contador RACF)

# --- Conexion y pool de OnDemand ---
ondemand:
  server-name: ${ONDEMAND_HOST}      # host o IP del library server
  port: 1234
  application-name: IMSS
  max-hits: 200
  language: ENU
  temp-dir: /tmp/odwek
  trace-level: 0                     # 0 = apagado; súbelo solo para diagnosticar

  # IDs de error de logon que son fallo de autenticacion (del manual Messages and
  # Codes). Vacio = todo fallo de logon se trata como tecnico. LLENAR antes de prod.
  # auth-error-ids:
  #   - 123

  ssl:
    enabled: false
    key-ring-file: ${ONDEMAND_KEYRING}
    key-stash-file: ${ONDEMAND_KEYSTASH}

  pool:
    max-total: 20
    max-idle: 20
    min-idle: 5
    max-wait-millis: 3000
    test-on-borrow: true
    test-while-idle: true
    time-between-eviction-runs-millis: 60000
    min-evictable-idle-time-millis: 300000
    warm-up-on-startup: true

# --- Logs utiles en dev (opcional) ---
logging:
  level:
    mx.infotec.imss.infrastructure: INFO
